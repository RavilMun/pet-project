services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pet-project-postgres
    environment:
      POSTGRES_DB: pet_project
      POSTGRES_USER: pet_project
      POSTGRES_PASSWORD: pet_project
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pet_project -d pet_project"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
