databaseChangeLog:
  - changeSet:
      id: 001-create-inbox-items
      author: codex
      changes:
        - createTable:
            tableName: inbox_items
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: raw_text
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: title
                  type: varchar(255)
              - column:
                  name: summary
                  type: text
              - column:
                  name: type
                  type: varchar(64)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(64)
                  constraints:
                    nullable: false
              - column:
                  name: source
                  type: varchar(64)
                  constraints:
                    nullable: false
              - column:
                  name: priority
                  type: varchar(64)
                  constraints:
                    nullable: false
              - column:
                  name: actionable
                  type: boolean
                  constraints:
                    nullable: false
              - column:
                  name: ai_metadata
                  type: jsonb
              - column:
                  name: processed_at
                  type: timestamp with time zone
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
        - createIndex:
            tableName: inbox_items
            indexName: idx_inbox_items_created_at
            columns:
              - column:
                  name: created_at
        - createIndex:
            tableName: inbox_items
            indexName: idx_inbox_items_status
            columns:
              - column:
                  name: status
        - createIndex:
            tableName: inbox_items
            indexName: idx_inbox_items_type
            columns:
              - column:
                  name: type

  - changeSet:
      id: 002-create-inbox-item-tags
      author: codex
      changes:
        - createTable:
            tableName: inbox_item_tags
            columns:
              - column:
                  name: item_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: tag
                  type: varchar(128)
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: inbox_item_tags
            baseColumnNames: item_id
            referencedTableName: inbox_items
            referencedColumnNames: id
            constraintName: fk_inbox_item_tags_item
            onDelete: CASCADE
        - addPrimaryKey:
            tableName: inbox_item_tags
            columnNames: item_id, tag
            constraintName: pk_inbox_item_tags
        - createIndex:
            tableName: inbox_item_tags
            indexName: idx_inbox_item_tags_tag
            columns:
              - column:
                  name: tag

  - changeSet:
      id: 003-create-inbox-item-links
      author: codex
      changes:
        - createTable:
            tableName: inbox_item_links
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: item_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: url
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: domain
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: inbox_item_links
            baseColumnNames: item_id
            referencedTableName: inbox_items
            referencedColumnNames: id
            constraintName: fk_inbox_item_links_item
            onDelete: CASCADE
        - createIndex:
            tableName: inbox_item_links
            indexName: idx_inbox_item_links_item_id
            columns:
              - column:
                  name: item_id
        - createIndex:
            tableName: inbox_item_links
            indexName: idx_inbox_item_links_domain
            columns:
              - column:
                  name: domain

  - changeSet:
      id: 004-add-telegram-metadata-to-inbox-items
      author: codex
      changes:
        - addColumn:
            tableName: inbox_items
            columns:
              - column:
                  name: telegram_chat_id
                  type: bigint
              - column:
                  name: telegram_message_id
                  type: bigint
        - createIndex:
            tableName: inbox_items
            indexName: idx_inbox_items_telegram_chat_created_at
            columns:
              - column:
                  name: telegram_chat_id
              - column:
                  name: created_at

  - changeSet:
      id: 005-add-inbox-item-search-text
      author: codex
      changes:
        - addColumn:
            tableName: inbox_items
            columns:
              - column:
                  name: search_text
                  type: text
        - sql:
            sql: |
              update inbox_items item
              set search_text = concat_ws(
                  ' ',
                  item.raw_text,
                  item.title,
                  item.summary,
                  item.type,
                  (
                      select string_agg(tag.tag, ' ' order by tag.tag)
                      from inbox_item_tags tag
                      where tag.item_id = item.id
                  )
              )
        - sql:
            sql: |
              create index idx_inbox_items_search_text_fts
              on inbox_items
              using gin (to_tsvector('russian', coalesce(search_text, '')))

  - changeSet:
      id: 006-add-inbox-item-simple-search-index
      author: codex
      changes:
        - sql:
            sql: |
              create index idx_inbox_items_search_text_simple_fts
              on inbox_items
              using gin (to_tsvector('simple', coalesce(search_text, '')))

  - changeSet:
      id: 007-add-inbox-item-embeddings
      author: codex
      changes:
        - sql:
            sql: create extension if not exists vector
        - addColumn:
            tableName: inbox_items
            columns:
              - column:
                  name: embedding
                  type: vector(1536)
              - column:
                  name: embedding_model
                  type: varchar(128)
              - column:
                  name: embedded_at
                  type: timestamp with time zone
        - sql:
            sql: |
              create index idx_inbox_items_embedding_hnsw
              on inbox_items
              using hnsw (embedding vector_cosine_ops)

  - changeSet:
      id: 008-create-memory-units
      author: codex
      changes:
        - sql:
            sql: create extension if not exists pgcrypto
        - createTable:
            tableName: memory_units
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: inbox_item_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: varchar(64)
                  constraints:
                    nullable: false
              - column:
                  name: title
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: summary
                  type: text
              - column:
                  name: search_text
                  type: text
              - column:
                  name: source_quote
                  type: text
              - column:
                  name: actionable
                  type: boolean
                  constraints:
                    nullable: false
              - column:
                  name: confidence
                  type: double precision
                  defaultValueNumeric: 1.0
                  constraints:
                    nullable: false
              - column:
                  name: occurred_at
                  type: timestamp with time zone
              - column:
                  name: due_at
                  type: timestamp with time zone
              - column:
                  name: ai_metadata
                  type: jsonb
              - column:
                  name: embedding
                  type: vector(1536)
              - column:
                  name: embedding_model
                  type: varchar(128)
              - column:
                  name: embedded_at
                  type: timestamp with time zone
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: memory_units
            baseColumnNames: inbox_item_id
            referencedTableName: inbox_items
            referencedColumnNames: id
            constraintName: fk_memory_units_inbox_item
            onDelete: CASCADE
        - createTable:
            tableName: memory_unit_tags
            columns:
              - column:
                  name: memory_unit_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: tag
                  type: varchar(128)
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: memory_unit_tags
            baseColumnNames: memory_unit_id
            referencedTableName: memory_units
            referencedColumnNames: id
            constraintName: fk_memory_unit_tags_unit
            onDelete: CASCADE
        - addPrimaryKey:
            tableName: memory_unit_tags
            columnNames: memory_unit_id, tag
            constraintName: pk_memory_unit_tags
        - sql:
            sql: |
              insert into memory_units (
                  id,
                  inbox_item_id,
                  type,
                  title,
                  summary,
                  search_text,
                  source_quote,
                  actionable,
                  confidence,
                  ai_metadata,
                  created_at,
                  updated_at
              )
              select
                  gen_random_uuid(),
                  item.id,
                  item.type,
                  coalesce(nullif(item.title, ''), left(item.raw_text, 120)),
                  item.summary,
                  item.search_text,
                  item.raw_text,
                  item.actionable,
                  0.5,
                  jsonb_build_object('source', 'inbox-item-backfill'),
                  item.created_at,
                  item.updated_at
              from inbox_items item
        - sql:
            sql: |
              insert into memory_unit_tags (memory_unit_id, tag)
              select unit.id, tag.tag
              from memory_units unit
              join inbox_item_tags tag on tag.item_id = unit.inbox_item_id
        - createIndex:
            tableName: memory_units
            indexName: idx_memory_units_inbox_item_id
            columns:
              - column:
                  name: inbox_item_id
        - createIndex:
            tableName: memory_units
            indexName: idx_memory_units_type
            columns:
              - column:
                  name: type
        - createIndex:
            tableName: memory_units
            indexName: idx_memory_units_created_at
            columns:
              - column:
                  name: created_at
        - createIndex:
            tableName: memory_unit_tags
            indexName: idx_memory_unit_tags_tag
            columns:
              - column:
                  name: tag
        - sql:
            sql: |
              create index idx_memory_units_search_text_fts
              on memory_units
              using gin (to_tsvector('russian', coalesce(search_text, '')))
        - sql:
            sql: |
              create index idx_memory_units_search_text_simple_fts
              on memory_units
              using gin (to_tsvector('simple', coalesce(search_text, '')))
        - sql:
            sql: |
              create index idx_memory_units_embedding_hnsw
              on memory_units
              using hnsw (embedding vector_cosine_ops)

  - changeSet:
      id: 009-create-memory-slots
      author: codex
      changes:
        - createTable:
            tableName: memory_slots
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: memory_unit_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: varchar(64)
                  constraints:
                    nullable: false
              - column:
                  name: value
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: normalized_value
                  type: text
              - column:
                  name: value_type
                  type: varchar(64)
                  defaultValue: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: confidence
                  type: double precision
                  defaultValueNumeric: 1.0
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: memory_slots
            baseColumnNames: memory_unit_id
            referencedTableName: memory_units
            referencedColumnNames: id
            constraintName: fk_memory_slots_unit
            onDelete: CASCADE
        - createIndex:
            tableName: memory_slots
            indexName: idx_memory_slots_unit_id
            columns:
              - column:
                  name: memory_unit_id
        - createIndex:
            tableName: memory_slots
            indexName: idx_memory_slots_role
            columns:
              - column:
                  name: role
        - createIndex:
            tableName: memory_slots
            indexName: idx_memory_slots_normalized_value
            columns:
              - column:
                  name: normalized_value
        - sql:
            sql: |
              create index idx_memory_slots_value_fts
              on memory_slots
              using gin (to_tsvector('russian', coalesce(value, '')))
        - sql:
            sql: |
              create index idx_memory_slots_normalized_value_fts
              on memory_slots
              using gin (to_tsvector('simple', coalesce(normalized_value, '')))

  - changeSet:
      id: 010-add-inbox-item-processing-state
      author: codex
      changes:
        - addColumn:
            tableName: inbox_items
            columns:
              - column:
                  name: processing_attempts
                  type: integer
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: last_processing_error
                  type: text
              - column:
                  name: next_attempt_at
                  type: timestamp with time zone
        - createIndex:
            tableName: inbox_items
            indexName: idx_inbox_items_status_next_attempt
            columns:
              - column:
                  name: status
              - column:
                  name: next_attempt_at

  - changeSet:
      id: 011-add-memory-unit-reminded-at
      author: codex
      changes:
        - addColumn:
            tableName: memory_units
            columns:
              - column:
                  name: reminded_at
                  type: timestamp with time zone
        - createIndex:
            tableName: memory_units
            indexName: idx_memory_units_due_at
            columns:
              - column:
                  name: due_at

  - changeSet:
      id: 012-add-memory-unit-completed-at
      author: codex
      changes:
        - addColumn:
            tableName: memory_units
            columns:
              - column:
                  name: completed_at
                  type: timestamp with time zone

  - changeSet:
      id: 013-add-inbox-item-image
      author: codex
      changes:
        - addColumn:
            tableName: inbox_items
            columns:
              - column:
                  name: image_file_id
                  type: varchar(255)
              - column:
                  name: media_type
                  type: varchar(64)

  - changeSet:
      id: 014-add-memory-unit-forgotten-at
      author: codex
      changes:
        - addColumn:
            tableName: memory_units
            columns:
              - column:
                  name: forgotten_at
                  type: timestamp with time zone
