spring.application.name=pet-project

telegram.bot.enabled=false
telegram.bot.token=${TELEGRAM_BOT_TOKEN:}
telegram.bot.username=${TELEGRAM_BOT_USERNAME:}
telegram.bot.allowed-chat-id=${TELEGRAM_ALLOWED_CHAT_ID:}
telegram.bot.intent-mode=${TELEGRAM_INTENT_MODE:HYBRID_SAFE}

openai.enabled=false
openai.api-key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:gpt-4.1-mini}
openai.embedding-model=${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
openai.rerank-enabled=${OPENAI_RERANK_ENABLED:false}
